plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group 'sentinel'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

javafx {
    version = "17" // Or 21, depending on your JDK
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

dependencies {
    implementation 'org.xerial:sqlite-jdbc:3.45.1.0'
}

application {
    mainClass = 'sentinel.Main'
}
